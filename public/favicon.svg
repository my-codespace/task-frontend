<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="40%" stop-color="#00e5ff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#006680" stop-opacity="0"/>
    </radialGradient>
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="100" height="100" rx="20" fill="#030b14" />

  <circle cx="50" cy="50" r="42" fill="none" stroke="#00e5ff" stroke-width="1.5" stroke-dasharray="4 6" opacity="0.6"/>
  
  <circle cx="50" cy="50" r="35" fill="none" stroke="#00e5ff" stroke-width="3" stroke-dasharray="25 5 5 5" filter="url(#neonGlow)"/>
  
  <circle cx="50" cy="50" r="20" fill="url(#coreGlow)" />
  
  <text x="50" y="52" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="900" fill="#030b14" text-anchor="middle" dominant-baseline="middle">J</text>
  
  <line x1="50" y1="2" x2="50" y2="10" stroke="#00e5ff" stroke-width="2" opacity="0.8"/>
  <line x1="50" y1="90" x2="50" y2="98" stroke="#00e5ff" stroke-width="2" opacity="0.8"/>
  <line x1="2" y1="50" x2="10" y2="50" stroke="#00e5ff" stroke-width="2" opacity="0.8"/>
  <line x1="90" y1="50" x2="98" y2="50" stroke="#00e5ff" stroke-width="2" opacity="0.8"/>
</svg>
